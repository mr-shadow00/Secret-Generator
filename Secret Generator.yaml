name: secret-generator
services:
  secret-generator:
    cpu_shares: 10
    command: []
    container_name: secret-generator
    deploy:
      resources:
        limits:
          memory: 1666598967
        reservations:
          devices: []
    image: nginx:alpine
    labels:
      icon: https://pb.dashboardicons.com/api/files/community_gallery/qpp30g2g0n2wrkn/auth_9d0pivzram.png
    ports:
      - target: 80
        published: "8090"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /DATA/AppData/secret-generator
        target: /usr/share/nginx/html
    devices: []
    cap_add: []
    environment: []
    network_mode: bridge
    privileged: false
x-casaos:
  author: self
  category: self
  hostname: ""
  icon: https://pb.dashboardicons.com/api/files/community_gallery/qpp30g2g0n2wrkn/auth_9d0pivzram.png
  index: /
  is_uncontrolled: false
  port_map: "8090"
  scheme: http
  store_app_id: secret-generator
  title:
    custom: Secret Generator
    en_us: secret-generator
